[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"

[tool.coverage.run]
branch = true
source = ["app"]

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.ruff]
target-version = "py312"
line-length = 140
exclude = [
  ".venv",
  "venv",
  "alembic/versions",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
ignore = ["E501"]
