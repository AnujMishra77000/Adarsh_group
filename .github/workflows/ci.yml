name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend compile, lint, and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      ENVIRONMENT: development
      SECRET_KEY: test-secret-key-with-enough-length-for-ci-checks
      ADMIN_MASTER_PASSWORD: test-admin-master-password
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "14"
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost:5174"]'
      SHOP_DATABASES: '{"adarsh-optical-centre":"sqlite:///./adarsh_optical_centre_test.db","adarsh-optometric-clinic":"sqlite:///./adarsh_optometric_clinic_test.db","adarsh-opticals-muxar":"sqlite:///./adarsh_opticals_muxar_test.db","adarsh-eye-boutique":"sqlite:///./adarsh_eye_boutique_test.db"}'
      SHOP_IDENTIFIER_MAPPINGS: "{}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall app

      - name: Lint backend
        run: ruff check app tests

      - name: Test backend
        run: pytest --cov=app --cov-report=term-missing

  crm:
    name: CRM typecheck, lint, build, and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck CRM
        run: npm run typecheck

      - name: Lint CRM
        run: npm run lint

      - name: Build CRM
        run: npm run build

      - name: Test CRM
        run: npm test

  website:
    name: Website typecheck, lint, build, and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck website
        run: npm run typecheck

      - name: Lint website
        run: npm run lint

      - name: Build website
        run: npm run build

      - name: Test website
        run: npm test
